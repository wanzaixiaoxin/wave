<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>海浪模拟</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; }
  #scene { display: block; width: 100vw; height: 100vh; }

  .panel {
    position: fixed; top: 20px; left: 20px;
    width: 260px; padding: 20px 22px;
    background: rgba(12, 26, 40, 0.42);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.14); border-radius: 16px;
    color: #eaf4ff; box-shadow: 0 8px 40px rgba(0,0,0,0.25);
    user-select: none; z-index: 10;
  }
  .panel h1 { font-size: 17px; font-weight: 600; letter-spacing: 2px; margin-bottom: 4px; }
  .panel .sub { font-size: 11px; opacity: .55; margin-bottom: 18px; letter-spacing: 1px; }
  .ctrl { margin-bottom: 16px; }
  .ctrl label { display: flex; justify-content: space-between; font-size: 12.5px; margin-bottom: 8px; opacity: .9; }
  .ctrl label .val { opacity: .6; font-variant-numeric: tabular-nums; }
  input[type=range] { -webkit-appearance: none; appearance: none; width: 100%; height: 4px; border-radius: 4px; background: rgba(255,255,255,0.18); outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #cfeaff; box-shadow: 0 0 8px rgba(180,220,255,0.8); cursor: pointer; transition: transform .15s; }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }
  input[type=range]::-moz-range-thumb { width: 16px; height: 16px; border: none; border-radius: 50%; background: #cfeaff; cursor: pointer; }
  .hint { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); font-size: 11px; color: rgba(255,255,255,0.4); letter-spacing: 1px; z-index: 10; }
  #err { position: fixed; top: 0; left: 0; z-index: 999; color: #fbb; background: rgba(0,0,0,.85); padding: 12px; font-size: 12px; max-width: 100%; white-space: pre-wrap; display: none; }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<pre id="err"></pre>

<div class="panel">
  <h1>海浪模拟</h1>
  <div class="sub">OCEAN SIMULATION</div>
  <div class="ctrl">
    <label>风速 <span class="val" id="windVal">6.0</span></label>
    <input type="range" id="wind" min="0" max="20" step="0.1" value="6">
  </div>
  <div class="ctrl">
    <label>浪高 <span class="val" id="heightVal">1.0</span></label>
    <input type="range" id="height" min="0" max="3" step="0.05" value="1">
  </div>
  <div class="ctrl">
    <label>光照 <span class="val" id="lightVal">0.65</span></label>
    <input type="range" id="light" min="0" max="1" step="0.01" value="0.65">
  </div>
</div>

<div class="hint">拖动滑块调整海面 · 移动鼠标改变太阳位置</div>

<script>
const canvas = document.getElementById('scene');
const errBox = document.getElementById('err');
const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
if (!gl) { errBox.style.display='block'; errBox.textContent='您的浏览器不支持 WebGL'; }

// ---------------- shaders ----------------
const vertSrc = `
precision highp float;
attribute vec3 aPos;          // grid position in XZ plane (y = 0)
uniform mat4  uProj, uView;
uniform float uTime, uWind, uHeight;
varying vec3  vWorld;
varying vec3  vNormal;
varying float vDist;
varying float vCrest;

// Gerstner wave: returns displaced position, writes normal & crest factor
vec3 gerstner(vec2 pos, vec2 dir, float steep, float wlen, float speed, float amp, inout vec3 nrm, inout float crest){
  float k = 6.2831853 / wlen;
  float c = sqrt(9.8 / k) * speed;
  vec2  d = normalize(dir);
  float f = k * dot(d, pos) - c * uTime;
  float a = amp;
  float cosf = cos(f);
  float sinf = sin(f);
  nrm.x -= d.x * (k * a * cosf);
  nrm.z -= d.y * (k * a * cosf);
  nrm.y -= steep * (k * a * sinf);
  crest = max(crest, sinf);
  return vec3(d.x * (a * cosf), a * sinf, d.y * (a * cosf));
}

void main(){
  vec2 p = aPos.xz;
  float H = 0.12 + uHeight * 0.55;          // global amplitude scale
  float sp = 0.6 + uWind * 0.12;            // global speed scale
  vec3 disp = vec3(0.0);
  vec3 nrm = vec3(0.0, 1.0, 0.0);
  float crest = -1.0;

  disp += gerstner(p, vec2( 1.0, 0.35), 0.62, 9.0, sp, H * 1.00, nrm, crest);
  disp += gerstner(p, vec2( 0.7,-0.7 ), 0.55, 5.2, sp, H * 0.55, nrm, crest);
  disp += gerstner(p, vec2(-0.6, 0.8 ), 0.50, 3.1, sp, H * 0.32, nrm, crest);
  disp += gerstner(p, vec2( 0.2, 1.0 ), 0.45, 1.9, sp, H * 0.18, nrm, crest);
  disp += gerstner(p, vec2( 1.0,-0.2 ), 0.40, 1.2, sp, H * 0.10, nrm, crest);

  vec3 world = vec3(aPos.x + disp.x, disp.y, aPos.z + disp.z);
  vWorld  = world;
  vNormal = normalize(nrm);
  vCrest  = crest;
  vec4 viewPos = uView * vec4(world, 1.0);
  vDist = length(viewPos.xyz);
  gl_Position = uProj * viewPos;
}
`;

const fragSrc = `
precision highp float;
varying vec3  vWorld;
varying vec3  vNormal;
varying float vDist;
varying float vCrest;
uniform vec3  uCam;
uniform vec3  uSun;
uniform float uLight;

vec3 skyColor(vec3 dir){
  dir = normalize(dir);
  float h = clamp(dir.y * 0.5 + 0.5, 0.0, 1.0);
  vec3 zenith  = vec3(0.18, 0.42, 0.72);
  vec3 horizon = vec3(0.78, 0.86, 0.92);
  vec3 col = mix(horizon, zenith, pow(h, 0.7));
  float s = clamp(dot(dir, uSun), 0.0, 1.0);
  col += vec3(1.0, 0.85, 0.6) * pow(s, 12.0) * 0.5;            // glow
  col += vec3(1.0, 0.95, 0.85) * pow(s, 900.0) * (1.5 + uLight); // disc
  return col;
}

void main(){
  vec3 N = normalize(vNormal);
  vec3 V = normalize(uCam - vWorld);
  vec3 L = normalize(uSun);

  float fres = 0.02 + 0.98 * pow(1.0 - max(dot(N, V), 0.0), 5.0);

  vec3 refl = reflect(-V, N);
  vec3 sky  = skyColor(refl);

  // water body colour (depth tint)
  vec3 deep    = vec3(0.012, 0.085, 0.16);
  vec3 shallow = vec3(0.04, 0.27, 0.34);
  float diff = max(dot(N, L), 0.0);
  vec3 body = mix(deep, shallow, diff);

  // specular sun glint
  vec3 H = normalize(L + V);
  float spec = pow(max(dot(N, H), 0.0), 220.0) * (0.8 + uLight * 2.0);

  // subsurface crest glow
  float sss = smoothstep(0.25, 1.0, vCrest) * 0.18;

  vec3 col = mix(body + sss, sky, fres);
  col += vec3(1.0, 0.93, 0.78) * spec;
  col *= (0.55 + uLight * 0.8);

  // distance haze -> blend into sky at the horizon (no hard seam)
  vec3 haze = skyColor(normalize(vec3(V.x, 0.06, V.z)));
  float fog = 1.0 - exp(-vDist * 0.006);
  col = mix(col, haze, clamp(fog, 0.0, 1.0));

  gl_FragColor = vec4(col, 1.0);
}
`;

function compile(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
    errBox.style.display='block';
    errBox.textContent = 'Shader 编译错误:\n' + gl.getShaderInfoLog(s);
  }
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, compile(gl.VERTEX_SHADER, vertSrc));
gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fragSrc));
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog, gl.LINK_STATUS)){
  errBox.style.display='block'; errBox.textContent = 'Link 错误:\n' + gl.getProgramInfoLog(prog);
}
gl.useProgram(prog);

// ---------------- grid mesh ----------------
const N = 200, SIZE = 160;
const verts = [], idx = [];
for(let z=0; z<=N; z++){
  for(let x=0; x<=N; x++){
    verts.push((x/N - 0.5) * SIZE, 0, -((z/N) * SIZE) - 4.0);
  }
}
for(let z=0; z<N; z++){
  for(let x=0; x<N; x++){
    const a = z*(N+1)+x, b = a+1, c = a+(N+1), d = c+1;
    idx.push(a, c, b,  b, c, d);
  }
}
const vbo = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array(verts), gl.STATIC_DRAW);
const ibo = gl.createBuffer();
gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, ibo);
gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, new Uint16Array(idx), gl.STATIC_DRAW);

const aPos = gl.getAttribLocation(prog, 'aPos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 3, gl.FLOAT, false, 0, 0);

const uProj = gl.getUniformLocation(prog, 'uProj');
const uView = gl.getUniformLocation(prog, 'uView');
const uTime = gl.getUniformLocation(prog, 'uTime');
const uWind = gl.getUniformLocation(prog, 'uWind');
const uHeight = gl.getUniformLocation(prog, 'uHeight');
const uCam  = gl.getUniformLocation(prog, 'uCam');
const uSun  = gl.getUniformLocation(prog, 'uSun');
const uLight= gl.getUniformLocation(prog, 'uLight');

// ---------------- matrix helpers ----------------
function perspective(fovy, aspect, near, far){
  const f = 1.0 / Math.tan(fovy/2), nf = 1/(near-far);
  return new Float32Array([
    f/aspect,0,0,0,
    0,f,0,0,
    0,0,(far+near)*nf,-1,
    0,0,2*far*near*nf,0
  ]);
}
function lookAt(eye, center, up){
  const z0=eye[0]-center[0], z1=eye[1]-center[1], z2=eye[2]-center[2];
  let zl=Math.hypot(z0,z1,z2); const zx=z0/zl, zy=z1/zl, zz=z2/zl;
  let x0=up[1]*zz-up[2]*zy, x1=up[2]*zx-up[0]*zz, x2=up[0]*zy-up[1]*zx;
  let xl=Math.hypot(x0,x1,x2)||1; const xx=x0/xl, xy=x1/xl, xz=x2/xl;
  const yx=zy*xz-zz*xy, yy=zz*xx-zx*xz, yz=zx*xy-zy*xx;
  return new Float32Array([
    xx,yx,zx,0,
    xy,yy,zy,0,
    xz,yz,zz,0,
    -(xx*eye[0]+xy*eye[1]+xz*eye[2]),
    -(yx*eye[0]+yy*eye[1]+yz*eye[2]),
    -(zx*eye[0]+zy*eye[1]+zz*eye[2]), 1
  ]);
}

// ---------------- state ----------------
const state = { wind:6, height:1, light:0.65, mx:0.5, my:0.35 };
function bind(id, valId, key, dec){
  const el=document.getElementById(id), out=document.getElementById(valId);
  const upd=()=>{ state[key]=parseFloat(el.value); out.textContent=parseFloat(el.value).toFixed(dec); };
  el.addEventListener('input', upd); upd();
}
bind('wind','windVal','wind',1);
bind('height','heightVal','height',2);
bind('light','lightVal','light',2);
window.addEventListener('mousemove', e=>{
  state.mx = e.clientX/window.innerWidth;
  state.my = 1.0 - e.clientY/window.innerHeight;
});

function resize(){
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  canvas.width = window.innerWidth*dpr;
  canvas.height = window.innerHeight*dpr;
  gl.viewport(0,0,canvas.width,canvas.height);
}
window.addEventListener('resize', resize); resize();

const start = performance.now();
function frame(){
  const t = (performance.now()-start)/1000;
  const aspect = canvas.width/canvas.height;

  // camera
  const eye = [0, 8.0, 14.0];
  const target = [0, 2.5, -20.0];
  const proj = perspective(50*Math.PI/180, aspect, 0.1, 400);
  const view = lookAt(eye, target, [0,1,0]);

  // sun from mouse (azimuth + elevation), in front (-Z) and above
  const az = (state.mx - 0.5) * 2.6;
  const el = 0.10 + state.my * 0.9;
  const sun = [Math.sin(az)*Math.cos(el), el + 0.25, -Math.cos(az)*Math.cos(el)];

  gl.uniformMatrix4fv(uProj, false, proj);
  gl.uniformMatrix4fv(uView, false, view);
  gl.uniform1f(uTime, t);
  gl.uniform1f(uWind, state.wind);
  gl.uniform1f(uHeight, state.height);
  gl.uniform3f(uCam, eye[0], eye[1], eye[2]);
  gl.uniform3f(uSun, sun[0], sun[1], sun[2]);
  gl.uniform1f(uLight, state.light);

  gl.clearColor(0.78,0.86,0.92,1);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
  gl.enable(gl.DEPTH_TEST);
  gl.drawElements(gl.TRIANGLES, idx.length, gl.UNSIGNED_SHORT, 0);

  requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
