<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公路驾驶</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:100%; height:100%; overflow:hidden; background:#111;
    font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; }
  #game { display:block; width:100vw; height:100vh; }
  .hud { position:fixed; top:16px; left:50%; transform:translateX(-50%);
    display:flex; gap:26px; padding:10px 24px; background:rgba(0,0,0,.45);
    color:#fff; border-radius:12px; font-size:13px; letter-spacing:1px; z-index:10;
    backdrop-filter:blur(6px); }
  .hud b { font-size:20px; margin-left:6px; }
  .help { position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    color:rgba(255,255,255,.55); font-size:12px; z-index:10; letter-spacing:1px; }
  .overlay { position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:18px; background:rgba(0,0,0,.62);
    color:#fff; z-index:20; }
  .overlay h1 { font-size:30px; letter-spacing:6px; }
  .overlay p { opacity:.8; font-size:14px; }
  .overlay button { padding:12px 34px; font-size:16px; border:none; border-radius:30px;
    background:#e63946; color:#fff; cursor:pointer; letter-spacing:3px; }
  .overlay button:hover { background:#ff5a67; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div class="hud">
  <div>里程<b id="lap">0.00</b> km</div>
  <div>时速<b id="spd">0</b></div>
  <div>时间<b id="time">0.0</b></div>
  <div>距终点<b id="dest">0</b> m</div>
  <div>视角<b id="view">后方俯视</b></div>
</div>
<div class="help">方向键 / WASD 驾驶 · R 重置 · C 切换视角</div>

<canvas id="minimap" width="170" height="120" style="position:fixed;right:16px;top:16px;z-index:10;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.2);border-radius:8px;"></canvas>
<div id="offroad" style="position:fixed;bottom:54px;left:50%;transform:translateX(-50%);z-index:10;color:#ffd166;font-size:13px;letter-spacing:2px;display:none;">⚠ 脱离路面</div>

<div class="overlay" id="overlay">
  <h1>公 路 驾 驶</h1>
  <p>用方向键或 WASD 驾驶，沿公路开到终点</p>
  <button id="startBtn">开 始</button>
</div>

<script>
function showErr(msg){
  let b=document.getElementById('err');
  if(!b){ b=document.createElement('pre'); b.id='err';
    b.style.cssText='position:fixed;top:0;left:0;z-index:999;color:#fbb;background:rgba(0,0,0,.9);padding:12px;font-size:12px;max-width:100%;white-space:pre-wrap;';
    document.body.appendChild(b); }
  b.textContent='运行错误:\n'+msg;
}
window.onerror=function(m,s,l,c,e){ showErr((m||'')+'\n'+(e&&e.stack?e.stack:('@'+l+':'+c))); };
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
function resize(){ canvas.width = innerWidth; canvas.height = innerHeight; }
addEventListener('resize', resize); resize();

// ---------- input ----------
const keys = {};
addEventListener('keydown', e=>{
  const k = e.key.toLowerCase();
  keys[k] = true;
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  if(k === 'r') reset();
  if(k === 'c' || k === 'v'){ view = view === 0 ? 1 : 0; }
});
addEventListener('keyup', e=>{ keys[e.key.toLowerCase()] = false; });

// ---------- road (open, point-to-point) ----------
const HALF = 130;
const ROAD = [];
let rx=0, ry=0, heading=0;
const RSTEPS=720, RSEG=20;
for(let i=0;i<RSTEPS;i++){
  ROAD.push({x:rx, y:ry});
  heading += Math.sin(i*0.025)*0.06 + Math.sin(i*0.008+1.3)*0.04;
  rx += Math.cos(heading)*RSEG;
  ry += Math.sin(heading)*RSEG;
}
const N = ROAD.length;

function distToRoad(px,py){
  let min = 1e9;
  for(let i=0;i<N-1;i++){
    const a = ROAD[i], b = ROAD[i+1];
    const dx=b.x-a.x, dy=b.y-a.y, len2=dx*dx+dy*dy||1;
    let t = ((px-a.x)*dx+(py-a.y)*dy)/len2;
    t = Math.max(0, Math.min(1, t));
    const d = Math.hypot(px-(a.x+dx*t), py-(a.y+dy*t));
    if(d<min) min=d;
  }
  return min;
}

// roadside trees (deterministic)
const TREES = [];
let seed = 987654321;
function rnd(){ seed = (seed*1103515245 + 12345) & 0x7fffffff; return seed/0x7fffffff; }
for(let i=12;i<N-12;i+=5){
  const p=ROAD[i], a=ROAD[Math.max(0,i-1)], b=ROAD[Math.min(N-1,i+1)];
  let tx=b.x-a.x, ty=b.y-a.y; const tl=Math.hypot(tx,ty)||1; tx/=tl; ty/=tl;
  const nx=-ty, ny=tx;
  const side = rnd()<0.5 ? 1 : -1;
  const off = HALF + 40 + rnd()*140;
  TREES.push({ x:p.x+nx*off*side, y:p.y+ny*off*side, s:0.7+rnd()*0.8 });
}

// ---------- car / state / camera ----------
const car = { x:0, y:0, ang:0, v:0, steer:0 };
const cam = { x:0, y:0, z:0, yaw:0, pitch:0 };
let view = 0;                 // 0 = 后方上空俯视, 1 = 驾驶员视角
let odometer=0, arrived=false, running=false, finished=false;
let startTime=0, finishTime=0;

// precompute road edge points (left / right borders), open path
const EDGE = [];
for(let i=0;i<N;i++){
  const a=ROAD[Math.max(0,i-1)], b=ROAD[Math.min(N-1,i+1)];
  let tx=b.x-a.x, ty=b.y-a.y; const tl=Math.hypot(tx,ty)||1; tx/=tl; ty/=tl;
  const nx=-ty, ny=tx;
  EDGE.push({ lx:ROAD[i].x+nx*HALF, ly:ROAD[i].y+ny*HALF, rx:ROAD[i].x-nx*HALF, ry:ROAD[i].y-ny*HALF });
}

// pseudo-3D pinhole projection
const NEAR = 1.0;
let FOV_F = 0;
function project(p){
  const rx=p.x-cam.x, ry=p.y-cam.y, rz=(p.z||0)-cam.z;
  const cy=Math.cos(cam.yaw), sy=Math.sin(cam.yaw);
  let fwd = rx*cy + ry*sy;
  let right = -rx*sy + ry*cy;
  let up = rz;
  const cp=Math.cos(cam.pitch), sp=Math.sin(cam.pitch);
  let fwd2 = fwd*cp - up*sp;
  let up2  = fwd*sp + up*cp;
  if(fwd2 < NEAR) fwd2 = NEAR;
  const F = FOV_F;
  return { x: canvas.width/2 + (right/fwd2)*F, y: canvas.height/2 - (up2/fwd2)*F, scale:F/fwd2, fwd:fwd };
}

function reset(){
  const a=ROAD[0], b=ROAD[1];
  car.x=a.x; car.y=a.y;
  car.ang=Math.atan2(b.y-a.y, b.x-a.x);
  car.v=0; car.steer=0;
  odometer=0; arrived=false; finished=false;
  const D=300;
  cam.x = car.x - Math.cos(car.ang)*D;
  cam.y = car.y - Math.sin(car.ang)*D;
  cam.z = 150; cam.yaw = car.ang; cam.pitch = 0.30;
}

const DEST = ROAD[N-1];
function updateRoad(dt){
  odometer += Math.abs(car.v) * dt * 0.01;
  if(!arrived && Math.hypot(car.x-DEST.x, car.y-DEST.y) < 90){
    arrived=true; finished=true; finishTime=performance.now(); running=false; showOverlay();
  }
}

// ---------- update ----------
function update(dt){
  if(!running || finished) return;
  const onTrack = distToRoad(car.x, car.y) < HALF;
  const maxV = onTrack ? 430 : 170;
  const accel = onTrack ? 520 : 240;
  const turn = onTrack ? 1.9 : 1.3;

  let throttle=0, steerIn=0;
  if(keys['arrowup']||keys['w']) throttle+=1;
  if(keys['arrowdown']||keys['s']) throttle-=1;
  if(keys['arrowleft']||keys['a']) steerIn-=1;
  if(keys['arrowright']||keys['d']) steerIn+=1;

  car.v += throttle * accel * dt;
  car.v -= car.v * Math.abs(car.v) * 0.0009 * dt;   // drag (frame-rate independent)
  if(throttle===0) car.v -= car.v * Math.min(1, 0.8*dt); // coast-down
  car.v = Math.max(-maxV*0.4, Math.min(maxV, car.v));

  // smoothed steering: ease toward input, ease back to center on release
  const steerRate = steerIn!==0 ? 5 : 8;
  car.steer += (steerIn - car.steer) * Math.min(1, steerRate*dt);
  const sf = Math.max(-1, Math.min(1, car.v/90));
  car.ang += car.steer * turn * dt * sf;

  car.x += Math.cos(car.ang) * car.v * dt;
  car.y += Math.sin(car.ang) * car.v * dt;

  // camera follows car
  if(view===0){            // chase: behind & above
    const D=300, Hgt=150, pitch=0.30;
    const tx = car.x - Math.cos(car.ang)*D;
    const ty = car.y - Math.sin(car.ang)*D;
    cam.x += (tx-cam.x)*Math.min(1,6*dt);
    cam.y += (ty-cam.y)*Math.min(1,6*dt);
    cam.z += (Hgt-cam.z)*Math.min(1,6*dt);
    cam.yaw = car.ang;
    cam.pitch += (pitch-cam.pitch)*Math.min(1,6*dt);
  } else {                 // driver: inside the car
    cam.x = car.x + Math.cos(car.ang)*6;
    cam.y = car.y + Math.sin(car.ang)*6;
    cam.z = 36; cam.yaw = car.ang; cam.pitch = 0.10;
  }

  updateRoad(dt);
}

// ---------- render (pseudo-3D) ----------
function drawCar3D(){
  const L=42, W=22, a=car.ang, ca=Math.cos(a), sa=Math.sin(a);
  const c=(dx,dy)=>project({x:car.x+dx*ca-dy*sa, y:car.y+dx*sa+dy*ca});
  const c1=c(L/2,-W/2), c2=c(L/2,W/2), c3=c(-L/2,W/2), c4=c(-L/2,-W/2);
  ctx.fillStyle='#e63946';
  ctx.beginPath(); ctx.moveTo(c1.x,c1.y); ctx.lineTo(c2.x,c2.y); ctx.lineTo(c3.x,c3.y); ctx.lineTo(c4.x,c4.y); ctx.closePath(); ctx.fill();
  const w1=c(2,-W/2+3), w2=c(2,W/2-3), w3=c(-9,W/2-3), w4=c(-9,-W/2+3);
  ctx.fillStyle='#1d3557';
  ctx.beginPath(); ctx.moveTo(w1.x,w1.y); ctx.lineTo(w2.x,w2.y); ctx.lineTo(w3.x,w3.y); ctx.lineTo(w4.x,w4.y); ctx.closePath(); ctx.fill();
  const h1=c(L/2,-W/2), h2=c(L/2,W/2);
  ctx.fillStyle='#ffd166';
  ctx.fillRect(h1.x-3, h1.y-3, 4, 4); ctx.fillRect(h2.x-1, h2.y-3, 4, 4);
}
function drawDashboard(){
  const h = canvas.height*0.18;
  const g = ctx.createLinearGradient(0, canvas.height-h, 0, canvas.height);
  g.addColorStop(0,'#7a1018'); g.addColorStop(1,'#3a060a');
  ctx.fillStyle=g; ctx.fillRect(0, canvas.height-h, canvas.width, h);
  ctx.fillStyle='rgba(0,0,0,.45)';
  ctx.beginPath(); ctx.moveTo(0,canvas.height-h); ctx.lineTo(canvas.width*0.14,canvas.height-h); ctx.lineTo(0,0); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(canvas.width,canvas.height-h); ctx.lineTo(canvas.width*0.86,canvas.height-h); ctx.lineTo(canvas.width,0); ctx.closePath(); ctx.fill();
}

function drawGate(i){
  const L0=project({x:EDGE[i].lx,y:EDGE[i].ly}), R0=project({x:EDGE[i].rx,y:EDGE[i].ry});
  ctx.strokeStyle='#fff'; ctx.lineWidth=6; ctx.beginPath(); ctx.moveTo(L0.x,L0.y); ctx.lineTo(R0.x,R0.y); ctx.stroke();
  ctx.strokeStyle='#111'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(L0.x,L0.y); ctx.lineTo(R0.x,R0.y); ctx.stroke();
}
function drawTrees(){
  const list=[];
  for(const t of TREES){
    const pr=project(t);
    if(pr.fwd<=NEAR) continue;
    list.push({ pr, t, d:(t.x-cam.x)*(t.x-cam.x)+(t.y-cam.y)*(t.y-cam.y) });
  }
  list.sort((a,b)=>b.d-a.d);
  for(const o of list){
    const pr=o.pr, sz=Math.max(4, 55*pr.scale*o.t.s);
    ctx.fillStyle='#5a3a1a';
    ctx.fillRect(pr.x-sz*0.08, pr.y-sz*0.5, sz*0.16, sz*0.5);
    ctx.fillStyle='#2f6b2f';
    ctx.beginPath(); ctx.arc(pr.x, pr.y-sz*0.55, sz*0.4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#3c8a3c';
    ctx.beginPath(); ctx.arc(pr.x-sz*0.12, pr.y-sz*0.7, sz*0.26, 0, Math.PI*2); ctx.fill();
  }
}

const mapCanvas = document.getElementById('minimap');
const mctx = mapCanvas.getContext('2d');
let ROAD_BB = null;
function updateMinimap(){
  if(!ROAD_BB){ let minx=1e9,miny=1e9,maxx=-1e9,maxy=-1e9;
    for(const p of ROAD){ if(p.x<minx)minx=p.x; if(p.y<miny)miny=p.y; if(p.x>maxx)maxx=p.x; if(p.y>maxy)maxy=p.y; }
    ROAD_BB={minx,miny,maxx,maxy}; }
  const W=mapCanvas.width, Hh=mapCanvas.height, pad=10;
  const sx=(W-2*pad)/((ROAD_BB.maxx-ROAD_BB.minx)||1), sy=(Hh-2*pad)/((ROAD_BB.maxy-ROAD_BB.miny)||1);
  const s=Math.min(sx,sy);
  const ox=pad-ROAD_BB.minx*s + (W-2*pad-(ROAD_BB.maxx-ROAD_BB.minx)*s)/2;
  const oy=pad-ROAD_BB.miny*s + (Hh-2*pad-(ROAD_BB.maxy-ROAD_BB.miny)*s)/2;
  const MX=x=>ox+x*s, MY=y=>oy+y*s;
  mctx.clearRect(0,0,W,Hh);
  mctx.strokeStyle='#9ad'; mctx.lineWidth=2; mctx.beginPath();
  for(let i=0;i<N;i++){ const p=ROAD[i]; if(i===0)mctx.moveTo(MX(p.x),MY(p.y)); else mctx.lineTo(MX(p.x),MY(p.y)); }
  mctx.stroke();
  mctx.fillStyle='#5f5'; mctx.beginPath(); mctx.arc(MX(DEST.x),MY(DEST.y),4,0,7); mctx.fill();
  mctx.fillStyle='#e63946'; mctx.beginPath(); mctx.arc(MX(car.x),MY(car.y),4,0,7); mctx.fill();
}

function draw(){
  FOV_F = canvas.height * 0.9 * (view===1 ? 1 + Math.min(1, Math.abs(car.v)/430)*0.4 : 1);
  const F = FOV_F;
  const horizonY = canvas.height/2 - Math.sin(cam.pitch)*F;

  // sky
  const sky = ctx.createLinearGradient(0,0,0,Math.max(1,horizonY));
  sky.addColorStop(0,'#7fb3e6'); sky.addColorStop(1,'#cfe6f5');
  ctx.fillStyle = sky; ctx.fillRect(0,0,canvas.width,Math.max(0,horizonY));
  // grass
  ctx.fillStyle = '#3a7d3a'; ctx.fillRect(0,horizonY,canvas.width,canvas.height-horizonY);

  // road: far -> near (open path)
  const segs=[];
  for(let i=0;i<N-1;i++){ const j=i+1;
    const mx=(EDGE[i].lx+EDGE[j].lx)/2-cam.x, my=(EDGE[i].ly+EDGE[j].ly)/2-cam.y;
    segs.push({i, d:mx*mx+my*my});
  }
  segs.sort((a,b)=>b.d-a.d);
  for(const s of segs){
    const i=s.i, j=i+1;
    const LA=project({x:EDGE[i].lx,y:EDGE[i].ly});
    const RA=project({x:EDGE[i].rx,y:EDGE[i].ry});
    const LB=project({x:EDGE[j].lx,y:EDGE[j].ly});
    const RB=project({x:EDGE[j].rx,y:EDGE[j].ry});
    if(LA.fwd<=NEAR && RA.fwd<=NEAR && LB.fwd<=NEAR && RB.fwd<=NEAR) continue;
    ctx.fillStyle='#333';
    ctx.beginPath(); ctx.moveTo(LA.x,LA.y); ctx.lineTo(RA.x,RA.y); ctx.lineTo(RB.x,RB.y); ctx.lineTo(LB.x,LB.y); ctx.closePath(); ctx.fill();
  }

  drawTrees();

  // dashed center line
  ctx.strokeStyle='rgba(255,255,255,.45)'; ctx.lineWidth=2; ctx.setLineDash([10,14]);
  ctx.beginPath(); let started=false;
  for(let i=0;i<N;i++){ const pr=project(ROAD[i]); if(pr.fwd<=NEAR){ started=false; continue; }
    if(!started){ ctx.moveTo(pr.x,pr.y); started=true; } else ctx.lineTo(pr.x,pr.y); }
  ctx.stroke(); ctx.setLineDash([]);

  // start gate + destination gate
  drawGate(0);
  drawGate(N-1);

  if(view===0) drawCar3D(); else drawDashboard();

  // HUD
  document.getElementById('lap').textContent = odometer.toFixed(2);
  document.getElementById('spd').textContent = Math.round(Math.abs(car.v)*0.5)+' km/h';
  document.getElementById('dest').textContent = Math.round(Math.hypot(car.x-DEST.x, car.y-DEST.y));
  const t = finished ? (finishTime-startTime)/1000 : (running?(performance.now()-startTime)/1000:0);
  document.getElementById('time').textContent = t.toFixed(1)+'s';
  document.getElementById('view').textContent = view===0 ? '后方俯视' : '驾驶员视角';

  // minimap + off-road warning
  updateMinimap();
  const off = distToRoad(car.x, car.y) >= HALF;
  document.getElementById('offroad').style.display = (off && running) ? 'block' : 'none';
}

// ---------- loop ----------
let last = performance.now();
function frame(now){
  const dt = Math.min(0.033, (now-last)/1000); last=now;
  update(dt);
  draw();
  requestAnimationFrame(frame);
}
reset();
requestAnimationFrame(frame);

// ---------- overlay ----------
const overlay = document.getElementById('overlay');
function showOverlay(){
  if(finished){
    const txt = arrived ? '到达终点！' : '完成';
    overlay.innerHTML = '<h1>'+txt+'</h1><p>里程 '+odometer.toFixed(2)+' km · 用时 '+((finishTime-startTime)/1000).toFixed(1)+' 秒</p>'+
      '<button id="again">再 开 一 次</button>';
    overlay.style.display='flex';
    document.getElementById('again').onclick = ()=>{ overlay.style.display='none'; reset(); startTime=performance.now(); running=true; if(document.activeElement&&document.activeElement.blur) document.activeElement.blur(); };
  }
}
document.getElementById('startBtn').onclick = ()=>{
  overlay.style.display='none';
  reset();
  startTime=performance.now();
  running=true;
  if(document.activeElement && document.activeElement.blur) document.activeElement.blur();
};
</script>
</body>
</html>
